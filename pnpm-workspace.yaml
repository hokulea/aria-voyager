allowBuilds:
  core-js: false
  edgedriver: false
  esbuild: false
  geckodriver: false
  msw: false
  unrs-resolver: false
minimumReleaseAge: 10080
# they can go after June, 23rd 2026
minimumReleaseAgeExclude:
  - "@gossi/config-eslint@1.3.4"
  - "@gossi/config-prettier@1.2.2"
  - "@gossi/config-template-lint@1.2.3"
  - "@ember/test-waiters@4.1.2"
  - "@napi-rs/wasm-runtime@1.1.5"
  - "@nodable/entities@2.2.0"
  - "@rolldown/binding-android-arm64@1.1.1"
  - "@rolldown/binding-darwin-arm64@1.1.1"
  - "@rolldown/binding-darwin-x64@1.1.1"
  - "@rolldown/binding-freebsd-x64@1.1.1"
  - "@rolldown/binding-linux-arm-gnueabihf@1.1.1"
  - "@rolldown/binding-linux-arm64-gnu@1.1.1"
  - "@rolldown/binding-linux-arm64-musl@1.1.1"
  - "@rolldown/binding-linux-ppc64-gnu@1.1.1"
  - "@rolldown/binding-linux-s390x-gnu@1.1.1"
  - "@rolldown/binding-linux-x64-gnu@1.1.1"
  - "@rolldown/binding-linux-x64-musl@1.1.1"
  - "@rolldown/binding-openharmony-arm64@1.1.1"
  - "@rolldown/binding-wasm32-wasi@1.1.1"
  - "@rolldown/binding-win32-arm64-msvc@1.1.1"
  - "@rolldown/binding-win32-x64-msvc@1.1.1"
  - "@types/node@20.19.43"
  - "acorn@8.17.0"
  - "bare-stream@2.13.3"
  - "baseline-browser-mapping@2.10.37"
  - "caniuse-lite@1.0.30001799"
  - "electron-to-chromium@1.5.372"
  - "eslint-plugin-unicorn@66.0.0"
  - "eslint@10.5.0"
  - "fast-xml-parser@5.9.0"
  - "function.prototype.name@1.2.0"
  - "is-document.all@1.0.0"
  - "is-unsafe@1.0.1"
  - "prettier@3.8.4"
  - "regjsparser@0.13.2"
  - "rolldown@1.1.1"
  - "semver@7.8.4"
  - "streamx@2.28.0"
  - "strnum@2.4.0"
  - "@vitest/browser-playwright@4.1.9"
  - "@vitest/browser@4.1.9"
  - "@vitest/coverage-istanbul@4.1.9"
  - "@vitest/expect@4.1.9"
  - "@vitest/mocker@4.1.9"
  - "@vitest/pretty-format@4.1.9"
  - "@vitest/runner@4.1.9"
  - "@vitest/snapshot@4.1.9"
  - "@vitest/spy@4.1.9"
  - "@vitest/ui@4.1.9"
  - "@vitest/utils@4.1.9"
  - "playwright-core@1.61.0"
  - "playwright@1.61.0"
  - "vitest@4.1.9"

packages:
  - packages/*

catalogs:
  build:
    "tsdown": "0.22.9"
    "typescript": "6.0.3"
    "vite": "8.0.16"
  lint:
    "@gossi/config-eslint": ^1.3.4
    "@gossi/config-prettier": ^1.2.2
    "@gossi/config-template-lint": ^1.2.3
    "ember-template-lint": ^7.9.3
    "eslint": ^10.5.0
    "eslint-plugin-ember": ^13.3.2
    "eslint-plugin-qunit": ^8.2.6
    "prettier": 3.8.4
  test:
    "@testing-library/dom": "10.4.1"
    "@vitest/browser-playwright": "^4.1.9"
    "@vitest/coverage-istanbul": "^4.1.9"
    "@vitest/ui": "^4.1.9"
    "playwright": "^1.61.0"
    "vitest": "^4.1.9"
  lib:
    "@hokulea/core": ^0.10.0
    "@hokulea/theme-moana": ^0.4.0
    "es-toolkit": ^1.43.0
